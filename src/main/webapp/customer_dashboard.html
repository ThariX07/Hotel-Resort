<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Guest Portal - Ocean View Resort</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Ocean View Resort - Guest Portal</span>
        <div>
            <a href="book_room.html" class="btn btn-light btn-sm me-2 fw-bold text-primary">Book a Room</a>
            <a href="index.html" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white p-3">
                    <h5 class="mb-0">My Booking History</h5>
                </div>
                <div class="card-body p-4">
                    <div id="errorBox" class="alert alert-danger d-none"></div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Reservation No.</th>
                                <th>Room Details</th>
                                <th>Check-In</th>
                                <th>Check-Out</th>
                                <th>Nights</th>
                                <th>Total Cost</th>
                            </tr>
                            </thead>
                            <tbody id="historyTableBody">
                            </tbody>
                        </table>
                    </div>

                    <div id="noDataMessage" class="text-center text-muted d-none py-5">
                        <h4 class="fw-light">You haven't made any reservations yet.</h4>
                        <p>Click 'Book a Room' at the top to plan your next coastal getaway!</p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {

        fetch('customer-history')
            .then(response => {
                // Security guard: If Tomcat says 401 Unauthorized, kick them back to login instantly
                if (response.status === 401) {
                    window.location.href = 'index.html';
                    throw new Error("Unauthorized");
                }
                return response.json();
            })
            .then(data => {
                if (data.status === 'success') {
                    const tbody = document.getElementById('historyTableBody');
                    const noData = document.getElementById('noDataMessage');
                    const reservations = data.reservations;

                    if (reservations.length === 0) {
                        noData.classList.remove('d-none');
                    } else {
                        reservations.forEach(res => {
                            // Extract dates safely whether they come as objects or strings
                            const formatIn = res.checkInDate.year ? `${res.checkInDate.year}-${String(res.checkInDate.month).padStart(2, '0')}-${String(res.checkInDate.day).padStart(2, '0')}` : res.checkInDate;
                            const formatOut = res.checkOutDate.year ? `${res.checkOutDate.year}-${String(res.checkOutDate.month).padStart(2, '0')}-${String(res.checkOutDate.day).padStart(2, '0')}` : res.checkOutDate;

                            const row = `<tr>
                                <td><span class="badge bg-secondary fs-6">${res.reservationNumber}</span></td>
                                <td><strong>${res.roomNumber}</strong> <br><small class="text-muted">${res.roomType}</small></td>
                                <td>${formatIn}</td>
                                <td>${formatOut}</td>
                                <td>${res.numberOfNights}</td>
                                <td class="text-success fw-bold fs-5">Rs. ${res.totalCost.toFixed(2)}</td>
                            </tr>`;
                            tbody.innerHTML += row;
                        });
                    }
                } else {
                    const errorBox = document.getElementById('errorBox');
                    errorBox.innerText = data.message;
                    errorBox.classList.remove('d-none');
                }
            })
            .catch(error => {
                if(error.message !== "Unauthorized") {
                    const errorBox = document.getElementById('errorBox');
                    errorBox.innerText = 'Network error: Could not load your history. Is Tomcat running?';
                    errorBox.classList.remove('d-none');
                }
            });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
