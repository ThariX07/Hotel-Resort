<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book a Room - Ocean View</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
  <div class="container">
    <span class="navbar-brand mb-0 h1">Ocean View Resort - Room Booking</span>
    <div>
      <a href="customer_dashboard.html" class="btn btn-outline-light btn-sm me-2">Back to Dashboard</a>
      <a href="index.html" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white p-3">
          <h5 class="mb-0">Secure Your Stay</h5>
        </div>
        <div class="card-body p-4">
          <div id="alertBox" class="alert d-none"></div>

          <form id="bookingForm">
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Full Name</label>
                <input type="text" id="guestName" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Contact Number</label>
                <input type="text" id="contactNumber" class="form-control" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Billing Address</label>
              <input type="text" id="address" class="form-control" required>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Select Room Type</label>
              <select id="roomId" class="form-select" required>
                <option value="1">Ocean View Suite (Rs. 15,000/night)</option>
                <option value="2">Standard Deluxe (Rs. 10,000/night)</option>
                <option value="3">Family Room (Rs. 20,000/night)</option>
              </select>
            </div>

            <div class="row mb-4">
              <div class="col-md-6">
                <label class="form-label fw-bold">Check-in Date</label>
                <input type="date" id="checkInDate" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Check-out Date</label>
                <input type="date" id="checkOutDate" class="form-control" required>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">Confirm Booking</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('bookingForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const alertBox = document.getElementById('alertBox');
    alertBox.className = 'alert d-none';

    const formData = new URLSearchParams();
    formData.append('guestName', document.getElementById('guestName').value);
    formData.append('contactNumber', document.getElementById('contactNumber').value);
    formData.append('address', document.getElementById('address').value);
    formData.append('roomId', document.getElementById('roomId').value);
    formData.append('checkInDate', document.getElementById('checkInDate').value);
    formData.append('checkOutDate', document.getElementById('checkOutDate').value);

    fetch('customer-booking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formData.toString()
    })
            .then(response => {
              if (response.status === 401) {
                window.location.href = 'index.html';
                throw new Error("Unauthorized");
              }
              return response.json();
            })
            .then(data => {
              alertBox.classList.remove('d-none');
              if (data.status === 'success') {
                alertBox.classList.add('alert-success');
                alertBox.innerText = data.message;

                // Teleport them back to their dashboard after 2 seconds to see their new booking
                setTimeout(() => {
                  window.location.href = 'customer_dashboard.html';
                }, 2000);
              } else {
                alertBox.classList.add('alert-danger');
                alertBox.innerText = data.message;
              }
            })
            .catch(error => {
              if(error.message !== "Unauthorized") {
                alertBox.classList.remove('d-none');
                alertBox.classList.add('alert-danger');
                alertBox.innerText = 'Network error. Please try again.';
              }
            });
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
